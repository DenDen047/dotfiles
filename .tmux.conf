# ==================================
# 基本設定
# ==================================
# 設定ファイルのリロード
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ==================================
# 表示設定
# ==================================
# 256色/True Color対応
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ステータスバー
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour136"
set -g status-left "#[fg=colour233,bg=colour245,bold] #S "
set -g status-right "#[fg=colour245] %Y-%m-%d %H:%M "
set -g status-left-length 20
set -g status-right-length 50

# ウィンドウステータス
setw -g window-status-current-style "fg=colour166,bg=colour238,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ペインボーダー
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour166"

# ==================================
# 操作設定
# ==================================
# マウスサポート
set -g mouse on

# ウィンドウ・ペイン番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じた際に番号を詰める
set -g renumber-windows on

# ペイン分割（直感的なキーバインド）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新しいウィンドウをカレントディレクトリで開く
bind c new-window -c "#{pane_current_path}"

# ペイン移動（vim風）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（vim風）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ==================================
# コピーモード / クリップボード連携
# ==================================
# vi キーバインド
setw -g mode-keys vi

# --- OSC 52 クリップボード連携 ---
# ターミナルのOSC 52エスケープシーケンスを利用し、
# tmuxバッファとシステムクリップボードを自動同期する。
# SSH越しでもX11フォワーディング不要で動作する。
# 対応ターミナル: iTerm2, Alacritty, Kitty, WezTerm, Ghostty 等
# 非対応: GNOME Terminal, XFCE Terminal 等のVTE系
set -s set-clipboard on

# --- copy-command (tmux 3.2+) ---
# すべてのcopy-pipe系バインドのデフォルトパイプ先を一括指定。
# OSC 52が使えない環境ではこちらがフォールバックになる。
# macOS の場合:
set -s copy-command 'pbcopy'
# Linux (X11) の場合は以下に差し替え:
# set -s copy-command 'xclip -selection clipboard -i'
# Linux (Wayland) の場合:
# set -s copy-command 'wl-copy'

# --- コピーモード キーバインド ---
# v: 選択開始（Vimのビジュアルモード風）
bind -T copy-mode-vi v send-keys -X begin-selection

# V: 行選択モード
bind -T copy-mode-vi V send-keys -X select-line

# C-v: 矩形選択トグル
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# y: ヤンク（コピー）→ copy-command へパイプ & コピーモード終了
# copy-command が設定済みなので引数不要（自動で pbcopy 等へ渡る）
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Enter: デフォルトの Enter にも同じ動作を割り当て
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel

# Escape: 選択解除 / コピーモード終了
bind -T copy-mode-vi Escape send-keys -X cancel

# --- マウス操作 ---
# ドラッグ終了時に自動コピー（→ copy-command へ）
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# --- ペースト ---
# prefix + P でtmuxバッファからペースト（小文字pはprevious-window）
bind P paste-buffer -p

# ダブルクリックで単語選択 → コピー
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel

# ==================================
# その他
# ==================================
# エスケープキーの遅延をなくす（Vim/Neovim向けに重要）
set -sg escape-time 0

# ヒストリのバッファサイズ
set -g history-limit 50000

# アクティビティ通知
setw -g monitor-activity on
set -g visual-activity off

# フォーカスイベントをパススルー（Vim/Neovimのautoread等に必要）
set -g focus-events on
